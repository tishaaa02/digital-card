<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f2ed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 2rem 1rem;
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    width: 100%;
    max-width: 420px;
    padding: 2.5rem 2rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #2c2c2c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 400;
    color: #f5f2ed;
    letter-spacing: 2px;
    margin-bottom: 1.25rem;
    flex-shrink: 0;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.2;
  }

  .title {
    font-size: 0.8rem;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-top: 0.4rem;
    font-weight: 400;
  }

  .division {
    font-size: 0.75rem;
    color: #aaa;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    margin-top: 0.2rem;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: #ebebeb;
    margin: 1.75rem 0;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    margin-bottom: 1.5rem;
  }

  .btn {
    padding: 0.75rem 1rem;
    border: 1.5px solid #2c2c2c;
    border-radius: 50px;
    background: transparent;
    color: #2c2c2c;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.2s, color 0.2s;
  }

  .btn:hover {
    background: #2c2c2c;
    color: #fff;
  }

  .btn.primary {
    background: #2c2c2c;
    color: #fff;
  }
  .btn.primary:hover {
    background: #444;
  }

  .contact-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0.85rem 1rem;
    border-radius: 14px;
    text-decoration: none;
    color: #1a1a1a;
    transition: background 0.15s;
    animation: fadeUp 0.6s ease both;
  }

  .contact-item:hover {
    background: #f5f2ed;
  }

  .icon-wrap {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-wrap svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .contact-text {
    font-size: 0.9rem;
    font-weight: 400;
    color: #1a1a1a;
    word-break: break-all;
  }

  .qr-section {
    margin-top: 1.75rem;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }

  .qr-label {
    font-size: 0.7rem;
    color: #bbb;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .qr-section img {
    width: 140px;
    height: 140px;
    border-radius: 10px;
    border: 1px solid #ebebeb;
  }

  .contact-item:nth-child(1) { animation-delay: 0.1s; }
  .contact-item:nth-child(2) { animation-delay: 0.2s; }
  .contact-item:nth-child(3) { animation-delay: 0.3s; }
</style>

function saveContact() {
  var vcard = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "FN:Abhijit Jalkote",
    "N:Jalkote;Abhijit;;;",
    "TITLE:DGM - Sales and Marketing",
    "ORG:Oleo and Pharma Division",

    "TEL;TYPE=CELL:+918125666714",
    "END:VCARD"
  ].join("\r\n");

  // Method 1: Blob download (works in most browsers)
  try {
    var blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "Abhijit_Jalkote.vcf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    return;
  } catch(e) {}

  // Method 2: data URI fallback (Google Lens / restricted browsers)
  try {
    var encoded = encodeURIComponent(vcard);
    window.location.href = "data:text/vcard;charset=utf-8," + encoded;
    return;
  } catch(e) {}

  // Method 3: Open in new tab as plain text (last resort)
  var w = window.open();
  w.document.write("<pre>" + vcard + "</pre>");
  w.document.title = "Abhijit_Jalkote.vcf";
}
